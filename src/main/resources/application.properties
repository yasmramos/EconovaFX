# =============================================================================
# EconoNova FX - Unified Application Configuration
# All configuration managed by Avaje Config from this single file
# =============================================================================

# -----------------------------------------------------------------------------
# Application Configuration
# -----------------------------------------------------------------------------
app.name=EconoNova FX
app.version=1.0.0
app.database.path=./db/econovadb

# -----------------------------------------------------------------------------
# Database Configuration (Default DataSource)
# -----------------------------------------------------------------------------
database.driver=org.h2.Driver
database.url=jdbc:h2:./db/econovadb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
database.username=sa
database.password=

# -----------------------------------------------------------------------------
# Master Database Configuration (for multi-tenant support)
# -----------------------------------------------------------------------------
ebean.datasource.master.driver=org.h2.Driver
ebean.datasource.master.url=jdbc:h2:./db/econova_master;DB_CLOSE_DELAY=-1
ebean.datasource.master.username=sa
ebean.datasource.master.password=

# Ebean DataSource Pool Settings
ebean.datasource.default.minConnections=1
ebean.datasource.default.maxConnections=10

# -----------------------------------------------------------------------------
# Ebean Server Configuration
# -----------------------------------------------------------------------------
ebean.server.name=econova-server
ebean.server.defaultServer=true

# DDL Generation (auto-create tables) - Disabled when using migrations
ebean.ddl.generate=false
ebean.ddl.run=false

# Migration Settings
ebean.migration.auto=true
ebean.migration.run=true
ebean.migration.generate=true
ebean.migration.resourcePath=dbmigration
ebean.migration.loadSeedData=true

# Database Platform Configuration for H2 compatibility
ebean.databasePlatformName=h2
ebean.disableLob=true
ebean.defaultTimestampPrecision=6

# SQL Logging
ebean.logging.sql=INFO
ebean.logging.level=INFO

# Migration Platform Settings
ebean.platform.h2.useMigration=true

# -----------------------------------------------------------------------------
# UI Settings
# -----------------------------------------------------------------------------
ui.theme=modern
ui.width=1200
ui.height=800

# -----------------------------------------------------------------------------
# Exchange Rate Cache Configuration
# -----------------------------------------------------------------------------
exchange.rate.cache.ttl.minutes=60
exchange.rate.scheduler.enabled=true
exchange.rate.scheduler.cron=0 0 6 * * ?

# -----------------------------------------------------------------------------
# Banco Central de Cuba API Settings
# -----------------------------------------------------------------------------
bcc.api.base.url=https://api.bc.gob.cu/v1/tasas-de-cambio
bcc.api.timeout.seconds=30
bcc.api.retry.max.attempts=3
bcc.api.retry.delay.ms=2000

# -----------------------------------------------------------------------------
# Security Configuration
# -----------------------------------------------------------------------------
security.session.timeout=30m
security.login.max.attempts=5
