# Application Configuration
app.name=EconoNova FX
app.version=1.0.0
app.database.path=./db/econovadb

# Database settings
database.driver=org.h2.Driver
database.url=jdbc:h2:./db/econovadb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
database.username=sa
database.password=

# UI Settings
ui.theme=modern
ui.width=1200
ui.height=800

# Exchange Rate Cache Configuration
exchange.rate.cache.ttl.minutes=60
exchange.rate.scheduler.enabled=true
exchange.rate.scheduler.cron=0 0 6 * * ?

# Banco Central de Cuba API Settings
bcc.api.base.url=https://api.bc.gob.cu/v1/tasas-de-cambio
bcc.api.timeout.seconds=30
bcc.api.retry.max.attempts=3
bcc.api.retry.delay.ms=2000
