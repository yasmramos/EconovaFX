# Configuración de base de datos para tests con H2
ebean:
  datasource:
    default:
      driver: org.h2.Driver
      url: jdbc:h2:mem:test_ebean_migrations;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
      username: sa
      password:
  
  # Habilitar migraciones
  migration:
    auto: true
    run: true
    generate: false
    resource:
      classpath: dbmigration
  
  # DDL settings
  ddl:
    generate: false
    run: false
    createSchema: false
  
  logging: true
  logging.level: INFO

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:test_ebean_migrations;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
