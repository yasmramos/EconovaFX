# Test Ebean Migration Configuration
# Enable automatic migration execution at startup for tests
ebean.migration.auto=true

# Auto generate migrations when entity models change
ebean.migration.generate=false

# Run migrations on startup
ebean.migration.run=true

# Database platform (H2 for testing)
ebean.platform.h2.useMigration=true

# Migration resource path for tests
ebean.migration.resourcePath=dbmigration

# Load seed data after migration
ebean.migration.loadSeedData=true

# Use in-memory database for tests
datasource.default.driver=org.h2.Driver
datasource.default.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
datasource.default.username=sa
datasource.default.password=
