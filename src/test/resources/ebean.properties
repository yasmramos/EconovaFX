# Test Ebean configuration
ebean.db.name=test-db
ebean.db.dataSource=default
ebean.datasource.default.driver=org.h2.Driver
ebean.datasource.default.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
ebean.datasource.default.username=sa
ebean.datasource.default.password=
ebean.ddl.generate=false
ebean.ddl.run=false
ebean.packages=com.econovafx.model

# Habilitar migraciones para tests
ebean.migration.auto=true
ebean.migration.run=true
ebean.migration.generate=false
ebean.migration.resource.classpath=dbmigration
